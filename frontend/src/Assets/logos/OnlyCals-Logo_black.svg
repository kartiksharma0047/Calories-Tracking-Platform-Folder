<?xml version="1.0" standalone="no"?>
<svg id="onlycals-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="auto" style="max-width: 650px;">
                <defs>
                    <!-- Google Font import for that perfect smooth, rounded look -->
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
                        .logo-text {
                            font-family: 'Nunito', 'Segoe UI Rounded', system-ui, sans-serif;
                            font-weight: 900;
                            font-size: 104px;
                            letter-spacing: -3.5px;
                        }
                    </style>
                    
                    <!-- The Vibrant Green Gradient -->
                    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#11998e"/>
                        <stop offset="100%" stop-color="#38ef7d"/>
                    </linearGradient>
                    
                    <!-- Text Gradient (Flows left to right) -->
                    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#11998e"/>
                        <stop offset="100%" stop-color="#38ef7d"/>
                    </linearGradient>

                    <!-- Lock Body Gradient for a subtle 3D smooth effect -->
                    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="100%" stop-color="#f1f5f9"/>
                    </linearGradient>

                    <!-- Beautiful soft drop shadow -->
                    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#11998e" flood-opacity="0.35"/>
                    </filter>
                </defs>

                <!-- 1. Background Circle -->
                <circle cx="100" cy="100" r="70" fill="url(#primaryGrad)" filter="url(#drop-shadow)"/>

                <!-- 2. Lock Icon (Slightly tilted for that iconic dynamic feel) -->
                <g transform="rotate(12 100 100)">
                    <!-- Shackle -->
                    <path d="M 82 90 V 68 A 18 18 0 0 1 118 68 V 90" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
                    
                    <!-- Lock Body -->
                    <circle cx="100" cy="108" r="30" fill="url(#lockGrad)"/>
                    
                    <!-- Keyhole (Punched out shape using the background gradient) -->
                    <path d="M 100 101 A 6.5 6.5 0 0 0 95 112 L 92.5 123 A 1 1 0 0 0 93.5 124 H 106.5 A 1 1 0 0 0 107.5 123 L 105 112 A 6.5 6.5 0 0 0 100 101 Z" fill="url(#primaryGrad)"/>
                </g>

                <!-- 3. Typography -->
                <text x="195" y="136" class="logo-text">
                    <tspan fill="#000000">Only</tspan><tspan fill="url(#textGrad)">Cals</tspan>
                </text>
            </svg>